<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markmap Editor</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #toolbar {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            background: #252526;
            border-bottom: 1px solid #333;
            gap: 8px;
            flex-shrink: 0;
            height: 36px;
            box-sizing: border-box;
        }

        #toolbar button {
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 4px 14px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 13px;
            line-height: 1.4;
        }

        #toolbar button:hover {
            background: #1177bb;
        }

        #toolbar button:active {
            background: #0d5689;
        }

        #filename {
            color: #ccc;
            font-size: 13px;
            margin-left: auto;
            user-select: none;
        }

        #workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #editor-pane {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        #mindmap-pane {
            width: 50%;
            height: 100%;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        #mindmap-pane svg {
            width: 100%;
            height: 100%;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            color: #ccc;
            font-size: 16px;
            z-index: 9999;
        }

        #loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>

    <div id="app">
        <div id="toolbar">
            <button id="btn-open" title="Open .md file (Ctrl+O)">Open</button>
            <button id="btn-save" title="Save (Ctrl+S)">Save</button>
            <button id="btn-save-as" title="Save As (Ctrl+Shift+S)">Save As</button>
            <span id="filename">Untitled.md</span>
        </div>
        <div id="workspace">
            <div id="editor-pane"></div>
            <div id="mindmap-pane">
                <svg id="markmap-svg"></svg>
            </div>
        </div>
    </div>

    <!-- CDN Dependencies (load order is critical!) -->
    <!-- 1. d3 MUST load before Monaco's AMD loader to avoid define.amd conflict -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <!-- 2. markmap-view: IIFE that reads global d3, writes to this.markmap -->
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <!-- 3. markmap-lib: IIFE that adds Transformer to this.markmap -->
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18.12/dist/browser/index.iife.js"></script>
    <!-- 4. Monaco AMD loader (loaded last to prevent d3 UMD/AMD conflict) -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>

    <script>
    (function () {
        'use strict';

        // ---- State ----
        var editor = null;
        var markmapInstance = null;
        var transformer = null;
        var currentFileHandle = null;
        var isDirty = false;
        var debounceTimer = null;

        // ---- Default Content ----
        var DEFAULT_MARKDOWN = [
            '# Mind Map',
            '',
            '## Topic A',
            '',
            '### Sub-topic A1',
            '',
            '### Sub-topic A2',
            '',
            '## Topic B',
            '',
            '### Sub-topic B1',
            '',
            '### Sub-topic B2',
            '',
            '## Topic C',
            ''
        ].join('\n');

        // ---- File Picker Options ----
        var FILE_PICKER_OPTIONS = {
            types: [{
                description: 'Markdown Files',
                accept: { 'text/markdown': ['.md'] }
            }],
            excludeAcceptAllOption: false
        };

        // ---- Mindmap Rendering ----
        function renderMindmap(markdownText) {
            if (!markdownText || !markdownText.trim()) {
                if (markmapInstance) {
                    markmapInstance.setData({ content: '', children: [] });
                }
                return;
            }

            try {
                var result = transformer.transform(markdownText);
                var root = result.root;

                if (!markmapInstance) {
                    var Markmap = window.markmap.Markmap;
                    var svgEl = document.getElementById('markmap-svg');
                    markmapInstance = Markmap.create(svgEl, undefined, root);
                } else {
                    markmapInstance.setData(root);
                    markmapInstance.fit();
                }
            } catch (err) {
                console.warn('Markmap render error:', err);
            }
        }

        function debouncedRender() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                renderMindmap(editor.getValue());
            }, 300);
        }

        // ---- File System Access API ----
        function supportsFileSystemAccess() {
            return 'showOpenFilePicker' in window && 'showSaveFilePicker' in window;
        }

        function getFileName() {
            if (currentFileHandle) {
                return currentFileHandle.name;
            }
            return 'Untitled.md';
        }

        function updateTitle() {
            var name = getFileName();
            var dirtyMark = isDirty ? ' *' : '';
            document.getElementById('filename').textContent = name + dirtyMark;
            document.title = name + dirtyMark + ' - Markmap Editor';
        }

        // ---- Open ----
        async function openFile() {
            if (isDirty) {
                if (!confirm('未保存の変更があります。続行しますか？')) {
                    return;
                }
            }

            if (supportsFileSystemAccess()) {
                await openFileNative();
            } else {
                openFileFallback();
            }
        }

        async function openFileNative() {
            try {
                var handles = await window.showOpenFilePicker(FILE_PICKER_OPTIONS);
                var handle = handles[0];
                var file = await handle.getFile();
                var text = await file.text();

                currentFileHandle = handle;
                editor.setValue(text);
                isDirty = false;
                updateTitle();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Open failed:', err);
                    alert('ファイルを開けませんでした: ' + err.message);
                }
            }
        }

        function openFileFallback() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,text/markdown,text/plain';

            input.addEventListener('change', function () {
                var file = input.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function () {
                    currentFileHandle = null;
                    editor.setValue(reader.result);
                    isDirty = false;
                    document.getElementById('filename').textContent = file.name;
                    document.title = file.name + ' - Markmap Editor';
                };
                reader.readAsText(file);
            });

            input.click();
        }

        // ---- Save ----
        async function saveFile() {
            if (supportsFileSystemAccess() && currentFileHandle) {
                await saveToHandle(currentFileHandle);
            } else {
                await saveFileAs();
            }
        }

        async function saveFileAs() {
            if (supportsFileSystemAccess()) {
                await saveFileAsNative();
            } else {
                saveFileFallback();
            }
        }

        async function saveFileAsNative() {
            try {
                var handle = await window.showSaveFilePicker({
                    suggestedName: getFileName(),
                    types: FILE_PICKER_OPTIONS.types,
                    excludeAcceptAllOption: false
                });
                await saveToHandle(handle);
                currentFileHandle = handle;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Save As failed:', err);
                    alert('ファイルを保存できませんでした: ' + err.message);
                }
            }
        }

        async function saveToHandle(handle) {
            var writable = await handle.createWritable();
            await writable.write(editor.getValue());
            await writable.close();
            isDirty = false;
            updateTitle();
        }

        function saveFileFallback() {
            var blob = new Blob([editor.getValue()], { type: 'text/markdown' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = getFileName();
            a.click();
            URL.revokeObjectURL(url);
            isDirty = false;
            updateTitle();
        }

        // ---- Keyboard Shortcuts ----
        function bindKeyboardShortcuts() {
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyO,
                function () { openFile(); }
            );
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
                function () { saveFile(); }
            );
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyS,
                function () { saveFileAs(); }
            );

            document.addEventListener('keydown', function (e) {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'o' || e.key === 'O') {
                        e.preventDefault();
                        openFile();
                    } else if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
                        e.preventDefault();
                        saveFileAs();
                    } else if (e.key === 's' || e.key === 'S') {
                        e.preventDefault();
                        saveFile();
                    }
                }
            });
        }

        // ---- Toolbar ----
        function bindToolbarEvents() {
            document.getElementById('btn-open').addEventListener('click', openFile);
            document.getElementById('btn-save').addEventListener('click', saveFile);
            document.getElementById('btn-save-as').addEventListener('click', saveFileAs);
        }

        // ---- Initialization ----
        function init() {
            // markmap is already loaded via sync script tags
            transformer = new window.markmap.Transformer();

            // Initialize Monaco Editor via AMD loader
            require.config({
                paths: {
                    'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
                }
            });

            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(
                    document.getElementById('editor-pane'),
                    {
                        value: DEFAULT_MARKDOWN,
                        language: 'markdown',
                        theme: 'vs-dark',
                        minimap: { enabled: false },
                        wordWrap: 'on',
                        fontSize: 14,
                        lineNumbers: 'on',
                        scrollBeyondLastLine: false,
                        automaticLayout: true
                    }
                );

                // Initial render
                renderMindmap(editor.getValue());

                // Real-time sync
                editor.onDidChangeModelContent(function () {
                    isDirty = true;
                    updateTitle();
                    debouncedRender();
                });

                // Bind events
                bindToolbarEvents();
                bindKeyboardShortcuts();

                // Window resize
                window.addEventListener('resize', function () {
                    if (markmapInstance) {
                        markmapInstance.fit();
                    }
                });

                // Unsaved changes warning
                window.addEventListener('beforeunload', function (e) {
                    if (isDirty) {
                        e.preventDefault();
                        e.returnValue = '';
                    }
                });

                // Hide loading
                document.getElementById('loading').classList.add('hidden');
            });
        }

        init();
    })();
    </script>
</body>
</html>
