<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markmap Editor</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e1e1e;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #toolbar {
            display: flex;
            align-items: center;
            padding: 4px 12px;
            background: #252526;
            border-bottom: 1px solid #333;
            gap: 8px;
            flex-shrink: 0;
            height: 36px;
            box-sizing: border-box;
        }

        #toolbar button {
            background: #0e639c;
            color: #fff;
            border: none;
            padding: 4px 14px;
            cursor: pointer;
            border-radius: 3px;
            font-size: 13px;
            line-height: 1.4;
        }

        #toolbar button:hover {
            background: #1177bb;
        }

        #toolbar button:active {
            background: #0d5689;
        }

        #depth-info {
            color: #888;
            font-size: 11px;
            margin-left: 8px;
            padding: 2px 8px;
            background: #333;
            border-radius: 3px;
            user-select: none;
        }

        #filename {
            color: #ccc;
            font-size: 13px;
            margin-left: auto;
            user-select: none;
        }

        #workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #editor-pane {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }

        #mindmap-pane {
            width: 50%;
            height: 100%;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        #mindmap-pane svg {
            width: 100%;
            height: 100%;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            color: #ccc;
            font-size: 16px;
            z-index: 9999;
        }

        #loading.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>

    <div id="app">
        <div id="toolbar">
            <button id="btn-open" title="Open .md file (Ctrl+O)">Open</button>
            <button id="btn-save" title="Save (Ctrl+S)">Save</button>
            <button id="btn-save-as" title="Save As (Ctrl+Shift+S)">Save As</button>
            <span id="depth-info">深さ: 0</span>
            <span id="filename">Untitled.md</span>
        </div>
        <div id="workspace">
            <div id="editor-pane"></div>
            <div id="mindmap-pane">
                <svg id="markmap-svg"></svg>
            </div>
        </div>
    </div>

    <!-- CDN Dependencies -->
    <!-- 1. d3 MUST load before Monaco's AMD loader to avoid define.amd conflict -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
    <!-- 2. markmap-view: IIFE that reads global d3, writes to this.markmap -->
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12/dist/browser/index.js"></script>
    <!-- 3. Monaco AMD loader (loaded last to prevent d3 UMD/AMD conflict) -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>

    <script>
    (function () {
        'use strict';

        // ---- State ----
        var editor = null;
        var markmapInstance = null;
        var currentFileHandle = null;
        var isDirty = false;
        var debounceTimer = null;

        // ---- Default Content (demonstrates deep nesting beyond 6 levels) ----
        var DEFAULT_MARKDOWN = [
            '# マインドマップ',
            '',
            '## カテゴリA',
            '',
            '### テーマ A1',
            '',
            '#### 詳細 A1-1',
            '',
            '##### 項目 A1-1-a',
            '',
            '###### 補足 A1-1-a-i',
            '',
            '####### レベル7: ← ここから拡張領域',
            '',
            '######## レベル8',
            '',
            '######### レベル9',
            '',
            '########## レベル10',
            '',
            '##### 項目 A1-1-b',
            '',
            '#### 詳細 A1-2',
            '',
            '### テーマ A2',
            '',
            '## カテゴリB',
            '',
            '### テーマ B1',
            '',
            '### テーマ B2',
            '',
            '#### 詳細 B2-1',
            '',
            '##### 項目 B2-1-a',
            '',
            '###### 補足 B2-1-a-i',
            '',
            '####### レベル7',
            '',
            '######## レベル8',
            '',
            '## カテゴリC',
            ''
        ].join('\n');

        // ================================================================
        //  CUSTOM MARKDOWN PARSER — Unlimited heading depth (30+ levels)
        //
        //  Standard Markdown only supports # through ###### (H1–H6).
        //  markmap-lib's Transformer enforces this limit.
        //
        //  This parser counts ANY number of leading '#' characters,
        //  so "##########" is treated as depth 10, etc.
        //  It also supports nested unordered/ordered list items
        //  under any heading, adding further depth.
        // ================================================================

        /**
         * Parse a Markdown string into a markmap-compatible tree.
         * Returns { root: { content, children, depth } }
         *
         * Supports:
         *   - Headings: unlimited '#' count (# = depth 1, ## = depth 2, … #####...# = depth N)
         *   - List items: '-', '*', '+', '1.' etc. nested by indentation under headings
         *   - Inline text between headings is appended to the last heading node's content
         *
         * @param {string} markdown  Raw markdown text
         * @returns {{ root: object, maxDepth: number }}
         */
        function parseMarkdownToTree(markdown) {
            if (!markdown || !markdown.trim()) {
                return { root: { content: '', children: [], depth: 0 }, maxDepth: 0 };
            }

            var lines = markdown.split(/\r?\n/);
            var root = { content: '', children: [], depth: 0 };
            var maxDepth = 0;

            // Stack of ancestor nodes, stack[i] is the current node at depth i
            // stack[0] = root
            var stack = [root];

            // Regex for heading: one or more '#' at the start of line
            var headingRegex = /^(#{1,99})\s+(.+)$/;

            // Regex for list items: leading whitespace + list marker
            var listRegex = /^(\s*)([-*+]|\d+[.)]) (.+)$/;

            // Track if we're processing list items under a heading
            var lastHeadingNode = null;
            var listBaseDepth = 0;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i];

                // --- Check if it's a heading ---
                var headingMatch = line.match(headingRegex);
                if (headingMatch) {
                    var depth = headingMatch[1].length;  // count of '#' characters
                    var content = headingMatch[2].trim();

                    if (depth > maxDepth) maxDepth = depth;

                    var node = {
                        content: content,
                        children: [],
                        depth: depth
                    };

                    // Find the correct parent: walk up the stack until we find
                    // a node whose depth is strictly less than this one
                    while (stack.length > 1 && stack[stack.length - 1].depth >= depth) {
                        stack.pop();
                    }

                    // Append as child of the current top of stack
                    stack[stack.length - 1].children.push(node);
                    stack.push(node);

                    // Reset list tracking
                    lastHeadingNode = node;
                    listBaseDepth = depth;

                    continue;
                }

                // --- Check if it's a list item ---
                var listMatch = line.match(listRegex);
                if (listMatch && lastHeadingNode) {
                    var indent = listMatch[1].length;
                    var listContent = listMatch[3].trim();

                    // Calculate list depth: 2 spaces or 1 tab per indent level
                    var indentLevel = Math.floor(indent / 2);
                    var listDepth = listBaseDepth + 1 + indentLevel;

                    if (listDepth > maxDepth) maxDepth = listDepth;

                    var listNode = {
                        content: listContent,
                        children: [],
                        depth: listDepth
                    };

                    // Find correct parent in stack
                    while (stack.length > 1 && stack[stack.length - 1].depth >= listDepth) {
                        stack.pop();
                    }

                    stack[stack.length - 1].children.push(listNode);
                    stack.push(listNode);

                    continue;
                }

                // --- Empty line or non-heading/list text: ignore for tree structure ---
                // (Could optionally append to last node's content, but markmap
                //  typically only uses heading/list text for nodes)
            }

            return { root: root, maxDepth: maxDepth };
        }

        // ---- Mindmap Rendering ----
        function renderMindmap(markdownText) {
            if (!markdownText || !markdownText.trim()) {
                if (markmapInstance) {
                    markmapInstance.setData({ content: '', children: [] });
                }
                updateDepthInfo(0);
                return;
            }

            try {
                var result = parseMarkdownToTree(markdownText);
                var root = result.root;
                var maxDepth = result.maxDepth;

                updateDepthInfo(maxDepth);

                // If the root has no content but has exactly one child,
                // use that child as the visual root (common pattern: single # heading)
                var displayRoot = root;
                if (!root.content && root.children.length === 1) {
                    displayRoot = root.children[0];
                } else if (!root.content && root.children.length > 1) {
                    // Multiple top-level headings: wrap them
                    displayRoot = { content: 'Root', children: root.children, depth: 0 };
                }

                if (!markmapInstance) {
                    var Markmap = window.markmap.Markmap;
                    var svgEl = document.getElementById('markmap-svg');
                    markmapInstance = Markmap.create(svgEl, {
                        /* markmap-view options */
                        autoFit: true,
                        duration: 300,
                        maxWidth: 300
                    }, displayRoot);
                } else {
                    markmapInstance.setData(displayRoot);
                    markmapInstance.fit();
                }
            } catch (err) {
                console.warn('Markmap render error:', err);
            }
        }

        function updateDepthInfo(depth) {
            var el = document.getElementById('depth-info');
            if (el) {
                el.textContent = '深さ: ' + depth + (depth > 6 ? ' (拡張)' : '');
                el.style.color = depth > 6 ? '#4ec9b0' : '#888';
            }
        }

        function debouncedRender() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(function () {
                renderMindmap(editor.getValue());
            }, 300);
        }

        // ---- File System Access API ----
        function supportsFileSystemAccess() {
            return 'showOpenFilePicker' in window && 'showSaveFilePicker' in window;
        }

        function getFileName() {
            if (currentFileHandle) {
                return currentFileHandle.name;
            }
            return 'Untitled.md';
        }

        function updateTitle() {
            var name = getFileName();
            var dirtyMark = isDirty ? ' *' : '';
            document.getElementById('filename').textContent = name + dirtyMark;
            document.title = name + dirtyMark + ' - Markmap Editor';
        }

        // ---- Open ----
        async function openFile() {
            if (isDirty) {
                if (!confirm('未保存の変更があります。続行しますか？')) {
                    return;
                }
            }

            if (supportsFileSystemAccess()) {
                await openFileNative();
            } else {
                openFileFallback();
            }
        }

        async function openFileNative() {
            try {
                var handles = await window.showOpenFilePicker({
                    types: [{
                        description: 'Markdown Files',
                        accept: { 'text/markdown': ['.md'] }
                    }],
                    excludeAcceptAllOption: false
                });
                var handle = handles[0];
                var file = await handle.getFile();
                var text = await file.text();

                currentFileHandle = handle;
                editor.setValue(text);
                isDirty = false;
                updateTitle();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Open failed:', err);
                    alert('ファイルを開けませんでした: ' + err.message);
                }
            }
        }

        function openFileFallback() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.md,text/markdown,text/plain';

            input.addEventListener('change', function () {
                var file = input.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function () {
                    currentFileHandle = null;
                    editor.setValue(reader.result);
                    isDirty = false;
                    document.getElementById('filename').textContent = file.name;
                    document.title = file.name + ' - Markmap Editor';
                };
                reader.readAsText(file);
            });

            input.click();
        }

        // ---- Save ----
        async function saveFile() {
            if (supportsFileSystemAccess() && currentFileHandle) {
                await saveToHandle(currentFileHandle);
            } else {
                await saveFileAs();
            }
        }

        async function saveFileAs() {
            if (supportsFileSystemAccess()) {
                await saveFileAsNative();
            } else {
                saveFileFallback();
            }
        }

        async function saveFileAsNative() {
            try {
                var handle = await window.showSaveFilePicker({
                    suggestedName: getFileName(),
                    types: [{
                        description: 'Markdown Files',
                        accept: { 'text/markdown': ['.md'] }
                    }],
                    excludeAcceptAllOption: false
                });
                await saveToHandle(handle);
                currentFileHandle = handle;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error('Save As failed:', err);
                    alert('ファイルを保存できませんでした: ' + err.message);
                }
            }
        }

        async function saveToHandle(handle) {
            var writable = await handle.createWritable();
            await writable.write(editor.getValue());
            await writable.close();
            isDirty = false;
            updateTitle();
        }

        function saveFileFallback() {
            var blob = new Blob([editor.getValue()], { type: 'text/markdown' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = getFileName();
            a.click();
            URL.revokeObjectURL(url);
            isDirty = false;
            updateTitle();
        }

        // ---- Keyboard Shortcuts ----
        function bindKeyboardShortcuts() {
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyO,
                function () { openFile(); }
            );
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS,
                function () { saveFile(); }
            );
            editor.addCommand(
                monaco.KeyMod.CtrlCmd | monaco.KeyMod.Shift | monaco.KeyCode.KeyS,
                function () { saveFileAs(); }
            );

            document.addEventListener('keydown', function (e) {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'o' || e.key === 'O') {
                        e.preventDefault();
                        openFile();
                    } else if (e.shiftKey && (e.key === 's' || e.key === 'S')) {
                        e.preventDefault();
                        saveFileAs();
                    } else if (e.key === 's' || e.key === 'S') {
                        e.preventDefault();
                        saveFile();
                    }
                }
            });
        }

        // ---- Toolbar ----
        function bindToolbarEvents() {
            document.getElementById('btn-open').addEventListener('click', openFile);
            document.getElementById('btn-save').addEventListener('click', saveFile);
            document.getElementById('btn-save-as').addEventListener('click', saveFileAs);
        }

        // ---- Initialization ----
        function init() {
            // Initialize Monaco Editor via AMD loader
            require.config({
                paths: {
                    'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs'
                }
            });

            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(
                    document.getElementById('editor-pane'),
                    {
                        value: DEFAULT_MARKDOWN,
                        language: 'markdown',
                        theme: 'vs-dark',
                        minimap: { enabled: false },
                        wordWrap: 'on',
                        fontSize: 14,
                        lineNumbers: 'on',
                        scrollBeyondLastLine: false,
                        automaticLayout: true
                    }
                );

                // Initial render
                renderMindmap(editor.getValue());

                // Real-time sync
                editor.onDidChangeModelContent(function () {
                    isDirty = true;
                    updateTitle();
                    debouncedRender();
                });

                // Bind events
                bindToolbarEvents();
                bindKeyboardShortcuts();

                // Window resize
                window.addEventListener('resize', function () {
                    if (markmapInstance) {
                        markmapInstance.fit();
                    }
                });

                // Unsaved changes warning
                window.addEventListener('beforeunload', function (e) {
                    if (isDirty) {
                        e.preventDefault();
                        e.returnValue = '';
                    }
                });

                // Hide loading
                document.getElementById('loading').classList.add('hidden');
            });
        }

        init();
    })();
    </script>
</body>
</html>
